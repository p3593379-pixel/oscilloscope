syntax = "proto3";

package oscilloscope_interface.v2;

import "google/protobuf/field_mask.proto";

option java_multiple_files = true;

// ─── Enums ────────────────────────────────────────────────────────────────────

enum DecimationTier {
  DECIMATION_TIER_UNSPECIFIED = 0;
  DECIMATION_TIER_FULL        = 1;
  DECIMATION_TIER_PREVIEW     = 2;
}

enum TriggerMode {
  TRIGGER_MODE_UNSPECIFIED = 0;
  TRIGGER_MODE_AUTO        = 1;
  TRIGGER_MODE_NORMAL      = 2;
  TRIGGER_MODE_SINGLE      = 3;
}

enum TriggerEdge {
  TRIGGER_EDGE_UNSPECIFIED = 0;
  TRIGGER_EDGE_RISING      = 1;
  TRIGGER_EDGE_FALLING     = 2;
}

enum Interpolation {
  INTERPOLATION_UNSPECIFIED = 0;
  INTERPOLATION_LINEAR      = 1;
  INTERPOLATION_SINC        = 2;
  INTERPOLATION_STEP        = 3;
}

enum DaqMode {
  DAQ_MODE_UNSPECIFIED = 0;
  DAQ_MODE_1           = 1;
  DAQ_MODE_2           = 2;
}

// ─── Settings model ───────────────────────────────────────────────────────────

message TriggerConfig {
  TriggerMode  mode    = 1;
  TriggerEdge  edge    = 2;
  float        level_v = 3;
  uint32       channel = 4;
}

message ChannelConfig {
  bool  enabled         = 1;
  float volts_per_div   = 2;
  float vertical_offset = 3;
}

// Top-level settings exchanged via GetSettings / SetSettings RPCs.
message OscilloscopeSettings {
  // ── Emulation / acquisition pipeline ─────────────────────────────────────
  uint64 sample_rate_hz       = 1;
  uint32 frame_size_samples   = 2;
  uint32 frame_frequency_hz   = 3;
  uint32 display_frequency_hz = 4;
  uint32 decimation_rate      = 5;

  // ── Spectrogram pipeline ──────────────────────────────────────────────────
  uint32 spectrogram_fft_size = 6;
  uint32 spectrogram_fps      = 7;

  // ── Rendering ─────────────────────────────────────────────────────────────
  Interpolation interpolation       = 8;
  bool          persistence_enabled = 9;
  float         persistence_decay   = 10;

  // ── Trigger ───────────────────────────────────────────────────────────────
  TriggerConfig trigger = 11;

  // ── Channels ──────────────────────────────────────────────────────────────
  repeated ChannelConfig channels = 12;

  // ── Display ───────────────────────────────────────────────────────────────
  bool   natural_units  = 13;
  uint32 display_theme  = 14;
  float  grid_opacity   = 15;

  // ── Synchronisation / DAQ ─────────────────────────────────────────────────
  DaqMode daq_mode          = 16;
  uint32  pre_delay_samples = 17;   // samples before trigger event

  // ── Spectrogram device settings ───────────────────────────────────────────
  float  spec_setting_one   = 18;
  float  spec_setting_two   = 19;
  float  spec_setting_three = 20;
  uint32 spec_setting_four  = 21;   // splitter: 0 = opt_a, 1 = opt_b

  // ── Archive ───────────────────────────────────────────────────────────────
  bool   write_adc                  = 22;
  string adc_archive_path           = 23;
  bool   write_spectrogram          = 24;
  string spectrogram_archive_path   = 25;
}

// ─── RPC messages ─────────────────────────────────────────────────────────────

message StreamDataRequest {
  string         stream_token         = 1;
  DecimationTier requested_tier       = 2;
  uint32         frame_size           = 3;
  uint32         display_frequency_hz = 4;
  uint32         decimation_rate      = 5;
}

message DataChunk {
  bytes          samples         = 1;
  uint64         sequence_number = 2;
  uint64         timestamp_ns    = 3;
  DecimationTier tier            = 4;
  uint64         sample_rate_hz  = 5;
  uint32         channels        = 6;
  uint32         frame_size      = 7;
  uint32         decimation_rate = 8;
}

// ─── Spectrogram stream ───────────────────────────────────────────────────────

message StreamSpectrogramRequest {
  string spectrogram_token = 1;
  uint32 fft_size          = 2;
  uint32 target_fps        = 3;
}

message SpectrogramChunk {
  bytes  magnitudes_db      = 1;
  uint64 sequence_number    = 2;
  uint64 timestamp_ns       = 3;
  uint32 fft_size           = 4;
  float  freq_resolution_hz = 5;
  uint64 sample_rate_hz     = 6;
  uint32 channels           = 7;
}

// ─── Settings RPCs ────────────────────────────────────────────────────────────

message GetSettingsRequest {}

message GetSettingsResponse {
  OscilloscopeSettings settings = 1;
}

message SetSettingsRequest {
  google.protobuf.FieldMask update_mask = 1;
  OscilloscopeSettings      settings    = 2;
}

message SetSettingsResponse {
  OscilloscopeSettings settings              = 1;
  bool                 stream_restart_needed = 2;
}

// ─── Directory browser RPC ────────────────────────────────────────────────────

message BrowseDirectoryRequest {
  string path = 1;   // absolute path to list; empty → "/"
}

message BrowseDirectoryEntry {
  string name     = 1;
  bool   is_dir   = 2;
}

message BrowseDirectoryResponse {
  string                    current_path = 1;
  string                    parent_path  = 2;   // empty when already at "/"
  repeated BrowseDirectoryEntry entries  = 3;
}

// ─── Services ─────────────────────────────────────────────────────────────────

service OscilloscopeService {
  rpc StreamData        (StreamDataRequest)        returns (stream DataChunk);
  rpc StreamSpectrogram (StreamSpectrogramRequest) returns (stream SpectrogramChunk);
  rpc GetSettings       (GetSettingsRequest)       returns (GetSettingsResponse);
  rpc SetSettings       (SetSettingsRequest)       returns (SetSettingsResponse);
  rpc BrowseDirectory   (BrowseDirectoryRequest)   returns (BrowseDirectoryResponse);
}
