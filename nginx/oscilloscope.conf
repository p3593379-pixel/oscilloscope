# ─── Upstream blocks ─────────────────────────────────────────────────────────
# These define the backend servers NGINX proxies to.
# "keepalive N" keeps N idle connections open to each backend so NGINX
# doesn't open a new TCP connection for every RPC call.

upstream control_plane_h2c {
    server 127.0.0.1:8080;   # BufConnectServer control plane (plain h2c)
    keepalive 64;
}

upstream config_rest {
    server 127.0.0.1:8081;   # cpp-httplib ConfigServer (plain HTTP/1.1)
    keepalive 64;
}

upstream data_plane_h2c {
    server 127.0.0.1:9090;   # BufConnectServer data plane (plain h2c)
    keepalive 64;
    keepalive_requests 1000;
}

