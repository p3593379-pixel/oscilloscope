upstream control_plane_h2c {
    server 192.168.30.28:1254;
    keepalive 64;
}

upstream data_plane_h2c {
    server 192.168.30.28:1256;
    keepalive 64;
}

server {
    listen 192.168.30.28:443 ssl;
    http2 on;

    server_name my_oscilloscope;

    ssl_certificate     /etc/nginx/ssl/oscilloscope-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/oscilloscope-selfsigned.key;

    ssl_protocols       TLSv1.2 TLSv1.3;

    ssl_ciphers         HIGH:!aNULL:!MD5;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    location ~ ^/(buf_connect_server\.v2\.) {
        proxy_pass http://control_plane_h2c;
        proxy_pass_header connect-protocol-version;
        proxy_pass_header content-type;

        proxy_http_version 2;
        proxy_set_header   Connection "";
        proxy_set_header Host $host;

        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/(oscilloscope_interface\.v2\.) {
            proxy_pass http://data_plane_h2c;
            proxy_pass_header connect-protocol-version;
            proxy_pass_header content-type;

            proxy_http_version 2;
            proxy_set_header   Connection "";
            proxy_set_header Host $host;

            proxy_request_buffering off;
            proxy_buffering         off;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root      /home/ppa/oscilloscope/cmake-build-debug/oscilloscope_backend/static/oscilloscope_web;
        try_files $uri $uri/ /index.html;

        add_header Access-Control-Allow-Credentials "true"              always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Connect-Protocol-Version, Connect-Timeout-Ms" always;
        add_header Access-Control-Allow-Methods     "POST, OPTIONS"     always;
        add_header Cache-Control "no-cache";
    }

}

server {
    listen 192.168.30.28:80;
    server_name 127.0.0.2 oscilloscope.local;
    return 301 https://$host$request_uri;
}
