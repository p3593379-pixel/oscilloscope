# ─── Control plane + web UIs ─────────────────────────────────────────────────
server {
    # Listen on 127.0.0.2:443 with TLS. "ssl" means this port speaks HTTPS
    listen 127.0.0.2:443 ssl;
    http2 on;

    # Matches requests with this Host header. The browser uses whatever
    # address you type, so both work locally.
    server_name 127.0.0.2 oscilloscope.local;

    # ── TLS certificate ───────────────────────────────────────────────────
    # The self-signed cert generated by gen-selfsigned-cert.sh.
    # Your browser will warn on first visit — add a permanent exception,
    # or import the .crt into your browser's trusted CA store to silence it.
    ssl_certificate     /etc/nginx/ssl/oscilloscope-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/oscilloscope-selfsigned.key;

    # Only allow TLS 1.2 and 1.3. TLS 1.0/1.1 are broken and disabled.
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Strong cipher list. !aNULL and !MD5 exclude unauthenticated/weak ciphers.
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Reuse TLS sessions for 1 hour — avoids full handshake on reconnect.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # ── Connect RPCs → control plane ─────────────────────────────────────
    # All Buf Connect / gRPC calls go here. NGINX's grpc_pass speaks HTTP/2
    # to the backend (h2c = HTTP/2 cleartext, no TLS between NGINX and
    # BufConnectServer since they're on the same machine).
location ~ ^/(buf_connect_server\.v2\.|oscilloscope_interface\.v2\.) {
        proxy_pass http://control_plane_h2c;
        proxy_pass_header connect-protocol-version;
        proxy_pass_header content-type;

        proxy_http_version 2;      # ← speak h2c to backend
        proxy_set_header   Connection "";
        proxy_set_header Host $host;
        # Don't buffer — CreateSession streaming must flow through immediately
        proxy_request_buffering off;
        proxy_buffering         off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Config REST API → cpp-httplib server ─────────────────────────────
    # HTTP/1.1 reverse proxy to the ConfigServer. "Connection: ''" is the
    # standard trick to enable keepalive to the upstream in HTTP/1.1
    # (the default "Connection: close" would disable it).
#     location /api/ {
#         proxy_pass         http://config_rest#   # trailing slash strips /api/ prefix
#         proxy_http_version 1.1#
#         proxy_set_header   Connection           ""#
#         proxy_set_header   Host                 $host#
#         proxy_set_header   X-Real-IP            $remote_addr#
#         proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for#
#         proxy_set_header   X-Forwarded-Proto    $scheme#
#         proxy_request_buffering off#
#     }

    # ── control_panel_web — admin UI at /control ─────────────────────────
    # "alias" (not "root") is correct here because the location prefix
    # /control/ must be stripped when mapping to the filesystem path.
    # With "root" NGINX would look for dist/control/... which doesn't exist.
#     location /control {
#         alias     /home/ppa/oscilloscope/cmake-build-debug/oscilloscope_backend/static/control_panel_web/#
#         try_files $uri $uri/ /control/index.html#
#         add_header Cache-Control "no-cache"#
#     }
# 
#     location = /control {
#         return 301 /control/#
#     }

    # ── oscilloscope_web — waveform viewer at / ───────────────────────────
    # Serves the Vite-built React app. try_files handles client-side routing:
    # any path that isn't a real file falls back to index.html so React Router
    # can take over.
    location / {
        root      /home/ppa/oscilloscope/cmake-build-debug/oscilloscope_backend/static/oscilloscope_web;
        try_files $uri $uri/ /index.html;

        add_header Access-Control-Allow-Origin      data_plane_h2c      always;
        add_header Access-Control-Allow-Credentials "true"              always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Connect-Protocol-Version, Connect-Timeout-Ms" always;
        add_header Access-Control-Allow-Methods     "POST, OPTIONS"     always;

        # Don't cache index.html — the browser must always fetch the latest
        # entry point so it picks up new hashed asset filenames after a build.
        add_header Cache-Control "no-cache";
    }

    # ── Download endpoint (ArchiveService file downloads) ─────────────────
    # Served directly by NGINX via X-Accel-Redirect for efficiency —
    # the backend issues a token and NGINX serves the file without the
    # app process touching the bytes.  Path is internal (not browser-accessible).
#    location /internal/archive/ {
#        internal;
#        alias /path/to/archive/storage/;
#    }
}

# ─── Data plane — streaming ───────────────────────────────────────────────────
# Separate port because in production this will be a separate NIC/IP.
# Locally we just use a different port on the same address.
# oscilloscope_web connects here directly with its stream token.
server {
    listen 127.0.0.2:8443 ssl;
    server_name 127.0.0.2 oscilloscope.local;

    ssl_certificate     /etc/nginx/ssl/oscilloscope-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/oscilloscope-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    location / {
        grpc_pass grpc://data_plane_h2c;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Streaming RPCs can run for hours — don't time them out.
        grpc_read_timeout  86400s;
        grpc_send_timeout  86400s;
    }
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
# Any plain http:// request gets a permanent redirect to https://.
# This also means http://127.0.0.2 → https://127.0.0.2 automatically.
server {
    listen 127.0.0.2:80;
    server_name 127.0.0.2 oscilloscope.local;
    return 301 https://$host$request_uri;
}
